<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor - MedTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">
                            <i class="fas fa-user-md me-2"></i>Add New Doctor
                        </h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label fw-semibold">
                                        <i class="fas fa-user me-2"></i>Full Name
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="name" name="name" 
                                           placeholder="Enter doctor's full name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-semibold">
                                        <i class="fas fa-envelope me-2"></i>Email Address
                                    </label>
                                    <input type="email" class="form-control form-control-lg" id="email" name="email" 
                                           placeholder="Enter email address" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="specialization" class="form-label fw-semibold">
                                        <i class="fas fa-stethoscope me-2"></i>Specialization
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="specialization" name="specialization" 
                                           placeholder="e.g., Cardiology, Neurology" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="experience" class="form-label fw-semibold">
                                        <i class="fas fa-calendar-alt me-2"></i>Experience (years)
                                    </label>
                                    <input type="number" class="form-control form-control-lg" id="experience" name="experience" 
                                           placeholder="Years of experience" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="availability" class="form-label fw-semibold">
                                        <i class="fas fa-clock me-2"></i>Availability
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="availability" name="availability" 
                                           placeholder="e.g., Mon-Fri 9AM-5PM" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="password" class="form-label fw-semibold">
                                        <i class="fas fa-lock me-2"></i>Password
                                    </label>
                                    <input type="password" class="form-control form-control-lg" id="password" name="password" 
                                           placeholder="Create a secure password" required>
                                </div>
                            </div>
                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg px-5">
                                    <i class="fas fa-save me-2"></i>Add Doctor
                                </button>
                                <a href="/" class="btn btn-outline-secondary btn-lg px-4">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
